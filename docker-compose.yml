# Dockerized PostgreSQL for AirRaidAlerts (Stage 1).
# Credentials are interpolated from .env (docker compose auto-loads it).
services:
  postgres:
    image: postgres:16
    container_name: airraid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airraid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airraid}
      POSTGRES_DB: ${POSTGRES_DB:-airraid}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - airraid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airraid} -d ${POSTGRES_DB:-airraid}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  airraid_pgdata:
